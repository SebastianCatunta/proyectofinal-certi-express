openapi: 3.0.3

info:
  title: Evaluator gestor API
  version: 1.0.0
  description: Sistema de gestión de evaluación académica de estudiantes 

servers:
  - url: http://localhost:3000
    description: Servidor local
  - url: https://proyectofinal-certi-express-grupo-11.onrender.com
    description: Servidor en Render

paths:
  /api/users:
    get:
      summary: Obtener todos los usuarios
      tags:
        - Users
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Lista de usuarios obtenida correctamente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserListResponse"
  
  /api/users/{id}:
    get:
      summary: Obtener un usuario por ID
      tags:
        - Users
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: ID del usuario
          schema:
            type: string
      responses:
        "200":
          description: Usuario obtenido correctamente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "404":
          description: Usuario no encontrado
    
    put:
      summary: Actualizar un usuario por ID
      tags:
        - Users
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: ID del usuario
          schema:
            type: string
      requestBody:
        required: true
